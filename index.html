<body>

<h1>Habit Tracker CRUD UI</h1>

<div class="container">

  <!-- INPUTS -->

  <input type="number" id="id" placeholder="ID (for PUT/DELETE)">
  <input type="text" id="name" placeholder="Habit Name">

  <select id="completed">
    <option value="false">Not Done</option>
    <option value="true">Done</option>
  </select>

  <input type="number" id="streak" placeholder="Streak">

  <br>

  <!-- BUTTONS -->

<button class="get" onclick="getHabits()">GET</button> <button class="post" onclick="addHabit()">POST</button> <button class="put" onclick="updateHabit()">PUT</button> <button class="delete" onclick="deleteHabit()">DELETE</button>

  <!-- TABLE -->

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Completed</th>
        <th>Streak</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>

const API = "https://habit-tracker-devops.onrender.com";

// GET
async function getHabits() {
  const res = await fetch(API + "/habits");
  const data = await res.json();

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.forEach(h => {
    tbody.innerHTML += `
      <tr>
        <td>${h.id ?? "-"}</td>
        <td>${h.name ?? "-"}</td>
        <td>${h.completed ?? "-"}</td>
        <td>${h.streak ?? "-"}</td>
      </tr>
    `;
  });
}

// POST
async function addHabit() {
  const name = document.getElementById("name").value;
  const completed = document.getElementById("completed").value === "true";
  const streak = Number(document.getElementById("streak").value) || 0;

  await fetch(API + "/habits", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, completed, streak })
  });

  alert("Habit Added!");
  getHabits();
}

// PUT (update habit)
async function updateHabit() {
  const id = document.getElementById("id").value;
  const name = document.getElementById("name").value;
  const completed = document.getElementById("completed").value === "true";
  const streak = Number(document.getElementById("streak").value) || 0;

  if (!id) {
    alert("Enter ID for update!");
    return;
  }

  await fetch(API + "/habits/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, completed, streak })
  });

  alert("Habit Updated!");
  getHabits();
}

// DELETE
async function deleteHabit() {
  const id = document.getElementById("id").value;

  if (!id) {
    alert("Enter ID to delete!");
    return;
  }

  await fetch(API + "/habits/" + id, {
    method: "DELETE"
  });

  alert("Habit Deleted!");
  getHabits();
}

// Load on start
getHabits();

</script>

</body>
</html>
