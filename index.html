<body>

<h1>Habit Tracker CRUD UI</h1>

<div class="container">

  <!-- INPUTS -->

  <input type="text" id="name" placeholder="Habit Name">
  <input type="number" id="id" placeholder="ID">

  <br>

  <!-- BUTTONS -->

<button class="get" onclick="getHabits()">GET</button> <button class="post" onclick="addHabit()">POST</button> <button class="put" onclick="updateHabit()">PUT</button> <button class="delete" onclick="deleteHabit()">DELETE</button>

  <!-- TABLE -->

  <table id="table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Completed</th>
        <th>Streak</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>

const API = "https://habit-tracker-devops.onrender.com";

// GET
async function getHabits() {
  const res = await fetch(API + "/habits");
  const data = await res.json();

  const tbody = document.querySelector("#table tbody");
  tbody.innerHTML = "";

  data.forEach(h => {
    tbody.innerHTML += `
      <tr>
        <td>${h.id}</td>
        <td>${h.name}</td>
        <td>${h.completed}</td>
        <td>${h.streak}</td>
      </tr>
    `;
  });
}

// POST
async function addHabit() {
  const name = document.getElementById("name").value;

  await fetch(API + "/habits", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name })
  });

  alert("Habit Added!");
  getHabits();
}

// PUT (Mark Done)
async function updateHabit() {
  const id = document.getElementById("id").value;

  await fetch(API + "/habits/" + id, {
    method: "PUT"
  });

  alert("Habit Updated!");
  getHabits();
}

// DELETE
async function deleteHabit() {
  const id = document.getElementById("id").value;

  await fetch(API + "/habits/" + id, {
    method: "DELETE"
  });

  alert("Habit Deleted!");
  getHabits();
}

</script>

</body>
</html>
