name: Node.js CI

on:
push:
branches: [ "main", "dev" ]
pull_request:
branches: [ "main", "dev" ]

jobs:
build:
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: .

steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Verify files (debug step)
    run: ls -la

  - name: Setup Node.js
    uses: actions/setup-node@v3
    with:
      node-version: '18'

  - name: Install dependencies
    run: npm install

  - name: Run tests
    run: npm test

  - name: Run ESLint
    run: npx eslint . || true
```
